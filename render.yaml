# Candeias — Web Service on Render (app + sync + password)
# Dashboard → New → Blueprint → connect this repo

services:
  - type: web
    name: candeias-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: candeias-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: APP_PASSWORD
        sync: false
      - key: CLOUD_SYNC_TOKEN
        sync: false
      - key: CLOUD_IS_SOURCE
        value: "true"
